<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unity WebSocket Tester</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #1a1a26;
    --border: #2a2a3e;
    --accent: #7c3aed;
    --accent2: #06b6d4;
    --success: #10b981;
    --error: #ef4444;
    --warning: #f59e0b;
    --text: #e2e8f0;
    --muted: #64748b;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Syne', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: auto 1fr;
    gap: 0;
  }

  /* ── HEADER ── */
  header {
    grid-column: 1 / -1;
    padding: 24px 40px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface);
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-icon {
    width: 40px; height: 40px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }

  h1 {
    font-size: 1.3rem;
    font-weight: 800;
    letter-spacing: -0.5px;
  }

  h1 span { color: var(--accent2); }

  .status-badge {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 16px;
    border-radius: 999px;
    font-family: var(--mono);
    font-size: 0.8rem;
    border: 1px solid var(--border);
    background: var(--surface2);
    transition: all 0.3s;
  }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--muted);
    transition: all 0.3s;
    box-shadow: 0 0 0 0 transparent;
  }

  .status-dot.connected {
    background: var(--success);
    box-shadow: 0 0 0 4px rgba(16,185,129,0.2);
    animation: pulse-green 2s infinite;
  }

  .status-dot.error { background: var(--error); }

  @keyframes pulse-green {
    0%, 100% { box-shadow: 0 0 0 0 rgba(16,185,129,0.4); }
    50% { box-shadow: 0 0 0 6px rgba(16,185,129,0); }
  }

  /* ── LEFT PANEL: CONFIG + SEND ── */
  .left-panel {
    padding: 32px 40px;
    display: flex;
    flex-direction: column;
    gap: 24px;
    border-right: 1px solid var(--border);
    overflow-y: auto;
  }

  /* ── RIGHT PANEL: LOG ── */
  .right-panel {
    padding: 32px 40px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    overflow-y: auto;
  }

  /* ── SECTIONS ── */
  .section-title {
    font-size: 0.7rem;
    font-family: var(--mono);
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--muted);
    margin-bottom: 12px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
  }

  /* ── INPUTS ── */
  .input-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 16px;
  }

  label {
    font-size: 0.8rem;
    color: var(--muted);
    font-family: var(--mono);
  }

  input[type="text"], textarea {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 0.9rem;
    padding: 12px 16px;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
  }

  input[type="text"]:focus, textarea:focus {
    border-color: var(--accent);
  }

  textarea { resize: vertical; min-height: 90px; }

  /* ── FILE UPLOAD ── */
  .upload-zone {
    border: 2px dashed var(--border);
    border-radius: 10px;
    padding: 24px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    background: var(--surface2);
    position: relative;
  }

  .upload-zone:hover, .upload-zone.drag-over {
    border-color: var(--accent);
    background: rgba(124,58,237,0.08);
  }

  .upload-zone input[type="file"] {
    position: absolute; inset: 0;
    opacity: 0; cursor: pointer; width: 100%; height: 100%;
  }

  .upload-icon { font-size: 2rem; margin-bottom: 8px; }
  .upload-text { font-size: 0.85rem; color: var(--muted); }
  .upload-text strong { color: var(--accent2); }

  /* Preview */
  #imagePreview {
    display: none;
    margin-top: 12px;
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid var(--border);
  }

  #imagePreview img {
    width: 100%;
    max-height: 200px;
    object-fit: contain;
    background: #000;
    display: block;
  }

  .preview-meta {
    padding: 8px 12px;
    font-family: var(--mono);
    font-size: 0.75rem;
    color: var(--muted);
    background: var(--surface2);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .remove-btn {
    background: none; border: none;
    color: var(--error); cursor: pointer;
    font-size: 0.8rem; font-family: var(--mono);
  }

  /* ── BUTTONS ── */
  .btn {
    padding: 14px 28px;
    border-radius: 10px;
    border: none;
    font-family: var(--sans);
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--accent), #6d28d9);
    color: white;
    width: 100%;
    font-size: 1rem;
    letter-spacing: 0.3px;
  }

  .btn-primary:hover:not(:disabled) {
    transform: translateY(-1px);
    box-shadow: 0 8px 24px rgba(124,58,237,0.35);
  }

  .btn-primary:disabled {
    opacity: 0.45;
    cursor: not-allowed;
    transform: none;
  }

  .btn-secondary {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 0.8rem;
    padding: 8px 14px;
  }

  .btn-secondary:hover { border-color: var(--accent2); }

  .btn-connect {
    background: transparent;
    border: 1px solid var(--accent2);
    color: var(--accent2);
    padding: 10px 20px;
    font-size: 0.85rem;
    border-radius: 8px;
    font-family: var(--mono);
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-connect:hover { background: rgba(6,182,212,0.1); }

  /* ── SEND FEEDBACK ── */
  .send-feedback {
    padding: 10px 14px;
    border-radius: 8px;
    font-family: var(--mono);
    font-size: 0.8rem;
    display: none;
    align-items: center;
    gap: 8px;
  }

  .send-feedback.success {
    display: flex;
    background: rgba(16,185,129,0.1);
    border: 1px solid rgba(16,185,129,0.3);
    color: var(--success);
  }

  .send-feedback.error {
    display: flex;
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.3);
    color: var(--error);
  }

  /* ── LOG ── */
  .log-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .log-container {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow-y: auto;
    font-family: var(--mono);
    font-size: 0.8rem;
    min-height: 300px;
  }

  .log-entry {
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 12px;
    align-items: start;
    animation: slide-in 0.2s ease;
  }

  @keyframes slide-in {
    from { opacity: 0; transform: translateX(-8px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .log-entry:last-child { border-bottom: none; }

  .log-time {
    color: var(--muted);
    white-space: nowrap;
    font-size: 0.72rem;
    padding-top: 2px;
  }

  .log-msg { color: var(--text); line-height: 1.5; word-break: break-all; }
  .log-msg.success { color: var(--success); }
  .log-msg.error { color: var(--error); }
  .log-msg.info { color: var(--accent2); }
  .log-msg.warn { color: var(--warning); }

  .log-empty {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 200px;
    color: var(--muted);
    font-size: 0.85rem;
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 768px) {
    body { grid-template-columns: 1fr; }
    .left-panel { border-right: none; border-bottom: 1px solid var(--border); }
    header { padding: 16px 20px; }
    .left-panel, .right-panel { padding: 20px; }
  }

  /* ── PROGRESS BAR ── */
  .progress-wrap {
    height: 4px;
    background: var(--surface2);
    border-radius: 2px;
    overflow: hidden;
    display: none;
    margin-top: 8px;
  }

  .progress-wrap.active { display: block; }

  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 2px;
    transition: width 0.1s;
    width: 0%;
  }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">
    <div class="logo-icon">⚡</div>
    <div>
      <h1>Unity <span>WebSocket</span> Tester</h1>
    </div>
  </div>
  <div style="display:flex; gap:12px; align-items:center;">
    <div class="status-badge">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText" style="font-family:var(--mono)">Chưa kết nối</span>
    </div>
  </div>
</header>

<!-- LEFT PANEL -->
<div class="left-panel">

  <!-- Kết nối -->
  <div class="card">
    <div class="section-title">📡 Kết nối WebSocket</div>
    <div class="input-group">
      <label>WebSocket Server URL</label>
      <div style="display:flex; gap:8px;">
        <input type="text" id="serverUrl" value="ws://localhost:8080" placeholder="ws://192.168.x.x:8080">
        <button class="btn-connect" id="connectBtn" onclick="toggleConnection()">Kết nối</button>
      </div>
    </div>
  </div>

  <!-- Dữ liệu gửi -->
  <div class="card">
    <div class="section-title">✉️ Dữ liệu gửi đến Unity</div>

    <!-- Text -->
    <div class="input-group">
      <label>Nội dung text</label>
      <textarea id="textInput" placeholder="Nhập nội dung sẽ hiển thị trong Unity khi va chạm..."></textarea>
    </div>

    <!-- Image Upload -->
    <div class="input-group">
      <label>Hình ảnh PNG / JPG</label>
      <div class="upload-zone" id="uploadZone">
        <input type="file" id="fileInput" accept="image/png,image/jpeg,image/webp" onchange="handleFileSelect(event)">
        <div class="upload-icon">🖼️</div>
        <div class="upload-text">Kéo thả hoặc <strong>nhấn để chọn ảnh</strong></div>
        <div class="upload-text" style="margin-top:4px; font-size:0.75rem;">PNG, JPG, WebP</div>
      </div>
      <div id="imagePreview">
        <img id="previewImg" src="" alt="preview">
        <div class="preview-meta">
          <span id="previewMeta">—</span>
          <button class="remove-btn" onclick="removeImage()">✕ Xoá</button>
        </div>
      </div>
      <div class="progress-wrap" id="progressWrap">
        <div class="progress-bar" id="progressBar"></div>
      </div>
    </div>

    <!-- Gửi -->
    <button class="btn btn-primary" id="sendBtn" onclick="sendData()" disabled>
      <span>⚡</span> Gửi đến Unity
    </button>
    <div style="margin-top:10px;">
      <div class="send-feedback" id="sendFeedback"></div>
    </div>
  </div>

  <!-- Quick presets -->
  <div class="card">
    <div class="section-title">🚀 Quick Test (không cần ảnh)</div>
    <div style="display:flex; flex-wrap:wrap; gap:8px;">
      <button class="btn btn-secondary" onclick="quickSend('Hello Unity! 👋')">Hello Unity</button>
      <button class="btn btn-secondary" onclick="quickSend('Vật thể đã va chạm! 💥')">Va chạm!</button>
      <button class="btn btn-secondary" onclick="quickSend('Điểm số: +100 ⭐')">+100 điểm</button>
      <button class="btn btn-secondary" onclick="quickSend('Game Over 🎮')">Game Over</button>
    </div>
  </div>
</div>

<!-- RIGHT PANEL: LOG -->
<div class="right-panel">
  <div class="log-header">
    <div class="section-title" style="margin-bottom:0">📋 Console Log</div>
    <button class="btn btn-secondary" onclick="clearLog()">Xoá log</button>
  </div>

  <div class="log-container" id="logContainer">
    <div class="log-empty" id="logEmpty">Chưa có sự kiện nào...</div>
  </div>

  <!-- Payload Preview -->
  <div class="card" style="margin-top:0;">
    <div class="section-title">📦 JSON Payload Preview</div>
    <div id="payloadPreview" style="font-family:var(--mono); font-size:0.78rem; color:var(--muted); line-height:1.6; white-space:pre-wrap; word-break:break-all;">
Điền text và chọn ảnh để xem payload...
    </div>
  </div>
</div>

<script>
// ─────────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────────
let ws = null;
let selectedImageBase64 = null;
let selectedFileName = '';
let selectedFileSize = 0;
let isConnected = false;

// ─────────────────────────────────────────────
//  WEBSOCKET
// ─────────────────────────────────────────────
function toggleConnection() {
  if (isConnected) disconnect();
  else connect();
}

function connect() {
  const url = document.getElementById('serverUrl').value.trim();
  if (!url) return log('⚠️ Nhập URL server trước!', 'warn');

  try {
    ws = new WebSocket(url);
    log(`Đang kết nối tới ${url}...`, 'info');
    setStatus('connecting');

    ws.onopen = () => {
      isConnected = true;
      setStatus('connected');
      log('✅ Kết nối thành công!', 'success');
      document.getElementById('connectBtn').textContent = 'Ngắt kết nối';
      document.getElementById('sendBtn').disabled = false;
    };

    ws.onclose = (e) => {
      isConnected = false;
      setStatus('disconnected');
      log(`❌ Đã ngắt kết nối (code: ${e.code})`, 'error');
      document.getElementById('connectBtn').textContent = 'Kết nối';
      document.getElementById('sendBtn').disabled = true;
    };

    ws.onerror = (e) => {
      log('❌ Lỗi WebSocket. Kiểm tra URL và Unity server.', 'error');
      setStatus('disconnected');
    };

    ws.onmessage = (e) => {
      log(`📨 Nhận từ server: ${e.data}`, 'info');
    };

  } catch(e) {
    log(`Lỗi: ${e.message}`, 'error');
  }
}

function disconnect() {
  if (ws) ws.close();
}

// ─────────────────────────────────────────────
//  GỬI DỮ LIỆU
// ─────────────────────────────────────────────
function sendData() {
  if (!isConnected) {
    showFeedback('Chưa kết nối WebSocket!', false);
    return;
  }

  const text = document.getElementById('textInput').value.trim();
  if (!text && !selectedImageBase64) {
    showFeedback('Vui lòng nhập text hoặc chọn ảnh!', false);
    return;
  }

  const payload = {
    text: text,
    image: selectedImageBase64 || ''
  };

  try {
    ws.send(JSON.stringify(payload));
    const imgInfo = selectedImageBase64
      ? ` + ảnh [${selectedFileName}, ${formatSize(selectedFileSize)}]`
      : '';
    log(`📤 Đã gửi: "${text}"${imgInfo}`, 'success');
    showFeedback(`Đã gửi thành công!`, true);
  } catch(e) {
    log(`❌ Gửi thất bại: ${e.message}`, 'error');
    showFeedback(`Gửi thất bại: ${e.message}`, false);
  }
}

function quickSend(text) {
  if (!isConnected) {
    showFeedback('Chưa kết nối WebSocket!', false);
    return;
  }
  const payload = { text: text, image: '' };
  ws.send(JSON.stringify(payload));
  log(`⚡ Quick send: "${text}"`, 'success');
  showFeedback('Đã gửi!', true);
}

// ─────────────────────────────────────────────
//  FILE HANDLING
// ─────────────────────────────────────────────
function handleFileSelect(event) {
  const file = event.target.files[0];
  if (!file) return;
  processFile(file);
}

function processFile(file) {
  if (!file.type.startsWith('image/')) {
    log('⚠️ Chỉ hỗ trợ file ảnh!', 'warn');
    return;
  }

  selectedFileName = file.name;
  selectedFileSize = file.size;

  // Progress bar
  const progressWrap = document.getElementById('progressWrap');
  const progressBar = document.getElementById('progressBar');
  progressWrap.classList.add('active');
  progressBar.style.width = '30%';

  const reader = new FileReader();

  reader.onprogress = (e) => {
    if (e.lengthComputable) {
      progressBar.style.width = (e.loaded / e.total * 80) + '%';
    }
  };

  reader.onload = (e) => {
    const dataUrl = e.target.result;
    // Strip data URL prefix để lấy base64 thuần
    selectedImageBase64 = dataUrl.split(',')[1];

    progressBar.style.width = '100%';
    setTimeout(() => progressWrap.classList.remove('active'), 400);

    // Show preview
    document.getElementById('previewImg').src = dataUrl;
    document.getElementById('previewMeta').textContent =
      `${file.name} · ${formatSize(file.size)} · ${file.type}`;
    document.getElementById('imagePreview').style.display = 'block';

    log(`🖼️ Đã tải ảnh: ${file.name} (${formatSize(file.size)})`, 'info');
    updatePayloadPreview();
  };

  reader.readAsDataURL(file);
}

function removeImage() {
  selectedImageBase64 = null;
  selectedFileName = '';
  selectedFileSize = 0;
  document.getElementById('fileInput').value = '';
  document.getElementById('imagePreview').style.display = 'none';
  document.getElementById('previewImg').src = '';
  log('🗑️ Đã xoá ảnh', 'warn');
  updatePayloadPreview();
}

// ─────────────────────────────────────────────
//  DRAG & DROP
// ─────────────────────────────────────────────
const zone = document.getElementById('uploadZone');
zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
zone.addEventListener('drop', e => {
  e.preventDefault();
  zone.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file) processFile(file);
});

// ─────────────────────────────────────────────
//  UI HELPERS
// ─────────────────────────────────────────────
function setStatus(state) {
  const dot = document.getElementById('statusDot');
  const text = document.getElementById('statusText');
  dot.className = 'status-dot';

  if (state === 'connected') {
    dot.classList.add('connected');
    text.textContent = 'Đã kết nối';
  } else if (state === 'connecting') {
    text.textContent = 'Đang kết nối...';
  } else {
    dot.classList.add('error');
    text.textContent = 'Chưa kết nối';
  }
}

function log(msg, type = 'info') {
  const container = document.getElementById('logContainer');
  const empty = document.getElementById('logEmpty');
  if (empty) empty.remove();

  const now = new Date();
  const time = now.toLocaleTimeString('vi-VN', { hour12: false });

  const entry = document.createElement('div');
  entry.className = 'log-entry';
  entry.innerHTML = `
    <span class="log-time">${time}</span>
    <span class="log-msg ${type}">${escapeHtml(msg)}</span>
  `;
  container.appendChild(entry);
  container.scrollTop = container.scrollHeight;
}

function clearLog() {
  document.getElementById('logContainer').innerHTML =
    '<div class="log-empty" id="logEmpty">Chưa có sự kiện nào...</div>';
}

function showFeedback(msg, success) {
  const el = document.getElementById('sendFeedback');
  el.className = `send-feedback ${success ? 'success' : 'error'}`;
  el.innerHTML = `<span>${success ? '✓' : '✗'}</span> ${escapeHtml(msg)}`;
  setTimeout(() => el.className = 'send-feedback', 3000);
}

function updatePayloadPreview() {
  const text = document.getElementById('textInput').value.trim();
  const preview = {
    text: text || '(trống)',
    image: selectedImageBase64
      ? `<base64... ${formatSize(Math.round(selectedImageBase64.length * 0.75))}>`
      : '(không có ảnh)'
  };
  document.getElementById('payloadPreview').textContent =
    JSON.stringify(preview, null, 2);
}

function formatSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / 1024 / 1024).toFixed(2) + ' MB';
}

function escapeHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Live preview update
document.getElementById('textInput').addEventListener('input', updatePayloadPreview);

// Init
log('Chào mừng! Điền URL và nhấn "Kết nối" để bắt đầu.', 'info');
updatePayloadPreview();
</script>
</body>
</html>
